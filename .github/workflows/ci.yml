name: MCPilot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings \
                      python-jose passlib httpx pytest pytest-asyncio \
                      python-dotenv slowapi mcp

      - name: Run unit tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql://postgres:password@localhost:5432/mcpilot
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Verify app imports cleanly
        run: |
          python -c "from main import app; print('✓ App imports OK')"
      - name: Run unit tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql://postgres:password@localhost:5432/mcpilot
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key
        run: |
          pytest tests/integration/ -v --tb=short